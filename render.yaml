services:
  - type: web
    name: lifenote-app
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm ci --prefix frontend && npm run build --prefix frontend && npm ci --omit=dev --prefix backend
    startCommand: npm --prefix backend start
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20
