services:
  - type: web
    name: lifenote-app
    runtime: node
    plan: free
    rootDir: .
    buildCommand: cd frontend && npm install --legacy-peer-deps && npm run build && cd ../backend && npm install --legacy-peer-deps
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_VERSION
        value: 20
